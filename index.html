<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I Convert | Professional Image Suite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="logo-area">
        <img
          src="1.png"
          alt="Logo"
          class="main-logo"
          onerror="this.src='https://via.placeholder.com/100?text=I'" />
        <span class="logo-text">I Convert</span>
      </div>
    </nav>

    <main>
      <div class="content-wrapper">
        <section class="hero-section">
          <div class="hero-badge">Beest Hack Club</div>
          <h1>
            Convert
            <span class="text-gradient">Image </span>
          </h1>
          <p class="description">
            High-fidelity image conversion. JPG, PNG, WebP or PDF instantly.
          </p>
        </section>

        <div class="converter-card">
          <div
            class="upload-zone"
            id="dropZone"
            onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon-wrapper">
              <span class="upload-icon">📄</span>
            </div>
            <p class="upload-text-big">CHOOSE A FILE OR DRAG IT HERE</p>
            <p class="upload-text-small">Supports JPG, PNG, WEBP, and more</p>
            <input
              type="file"
              id="fileInput"
              accept="image/*"
              style="display: none" />
          </div>

          <div class="action-bar" id="actionBar">
            <div class="format-selector">
              <label for="formatSelect">Export as:</label>
              <select id="formatSelect">
                <option value="image/jpeg">JPEG (.jpg)</option>
                <option value="image/png">PNG (.png)</option>
                <option value="image/webp">WebP (.webp)</option>
                <option value="application/pdf">PDF Document (.pdf)</option>
              </select>
            </div>
            <button class="btn-premium" onclick="convertImage()">
              <span>Convert Now</span>
              <div class="shimmer"></div>
            </button>
          </div>
        </div>

        <div class="preview-section" id="previewArea">
          <div class="preview-card">
            <div class="preview-header">
              <h3>Conversion Result</h3>
            </div>
            <div id="imageWrapper"></div>
            <button class="btn-premium download-mode" id="downloadBtn">
              Download Converted File
            </button>
          </div>
        </div>

        <p id="status" class="status-text"></p>
      </div>
    </main>

    <footer>
      <p class="footer-text">
        By <span class="badge">Sadrita Neogi</span> under
        <span class="badge">Hack Club</span>
      </p>
    </footer>

    <script src="https://raw.githack.com/strangerintheq/rgba/0.0.8/rgba.js"></script>
    <script>
      RGBA(`
    #define PI 3.1415926538
    #define CELL 0.01
    #define GRID 50.0

    float sdOrientedBox( in vec2 p, in vec2 a, in vec2 b, float th ) {
        float l = length(b-a);
        vec2  d = (b-a)/l;
        vec2  q = (p-(a+b)*0.5);
              q = mat2(d.x,-d.y,d.y,d.x)*q;
              q = abs(q)-vec2(l,th)*0.5;
        return length(max(q,0.0)) + min(max(q.x,q.y),0.0);    
    }

    float sdCross( in vec2 p, in float size ) {
      float width = 0.05;
      float line = 0.01;
      float outer0 = sdOrientedBox(p, vec2(size, size), vec2(-size, -size), width);
      float inner0 = sdOrientedBox(p, vec2(size - line, size - line), vec2(-size + line, -size + line), width - line * 2.5);
      float outer1 = sdOrientedBox(p, vec2(-size, size), vec2(size, -size), width);
      float inner1 = sdOrientedBox(p, vec2(-size + line, size - line), vec2(size - line, -size + line), width - line * 2.5);
      float innerCross = min(inner0, inner1);
      float outerCross = min(outer0, outer1);
      return max(outerCross, -innerCross);
    }

    float sdSquare( in vec2 p, in float size ) {
      float width = 0.05;
      float line = 0.01;
      float outer = sdOrientedBox(p, vec2(size, size), vec2(-size, -size), size * 2.65);
      float inner = sdOrientedBox(p, vec2(size - line, size - line), vec2(-size + line, -size + line), (size * 2.65) - line * 2.5);
      return max(outer, -inner);
    }
          
    vec2 grid(vec2 uv) {
      return floor(uv * GRID) * CELL;
    }

    vec3 getColor(vec2 uv, float d, float n) {  
      vec3 fgColor = vec3(1.0, 1.0, 1.0);
      vec3 fgColor2 = vec3(0.8, 0.6, 0.0);
      vec3 bgColor = vec3(0.1, 0.1, 0.05);
      
      if (n < 0.1) {
        float mx = mod(uv.x, CELL * 2.);
        float my = mod(uv.y, CELL * 2.);
        return mix(bgColor, fgColor2, step(CELL, min(mx, my)));
      }
      
      if (d < 0.1) {
        float mx = mod(uv.x, CELL * 2.);
        float my = mod(uv.y, CELL * 2.);
        return mix(bgColor, fgColor, step(CELL, min(mx, my)));
      }
      
      return bgColor;
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / resolution.xy*2.-1.;
      uv.y *= resolution.y/resolution.x;
      
      vec2 ruv = uv;
      float d = 1.;
      float n = 1.;
      vec2 muv = uv;
      
      muv = grid(muv);
      vec2 guv = grid(ruv);
      
      float step = 0.125;
      float row = floor((uv.y - 0.01) * 4.0) * step;
      float diffX = sin(time + row * 40.) * 0.5;
      
      float stepX = step;
      float stepY = step;
      
      float t = mod(pow(mod(uv.x * 0.25 + time * 0.5, 1.0), 8.) * 0.25, 0.25);
      
      d = sdCross(mod(guv, step * 2.) - vec2(stepX, stepY), 0.18);
      n = min(sdCross(mod(guv + vec2(step, t), step * 2.) - vec2(stepX, stepY), 0.054), n);
      n = min(sdSquare(mod(guv + vec2(step, t), step * 2.) - vec2(stepX, stepY), 0.054), n);
      
      d = smoothstep(0.0, 0.01, d);
      n = smoothstep(0.0, 0.01, n);

      vec3 color = getColor(ruv, d, n);
      gl_FragColor = vec4(color, 1.);
    }
    `);
    </script>
    <script src="script.js"></script>
  </body>
</html>
